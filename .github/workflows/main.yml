          async function scrollFullPage(page) {
            await page.evaluate(async () => {
              await new Promise(resolve => {
                let lastY = -1;
                const step = () => {
                  window.scrollBy(0, 500);
                  if (window.scrollY === lastY || window.scrollY + window.innerHeight >= document.body.scrollHeight) {
                    resolve();
                    return;
                  }
                  lastY = window.scrollY;
                  requestAnimationFrame(step);
                };
                step();
              });
            });
          }

          async function scrollToElement(locator) {
            await locator.waitFor({ state: "attached" });
            await locator.evaluate(el => {
              el.scrollIntoView({ block: "center", inline: "center" });
            });
          }

          async function dismissConsentPopup(page) {
            // Simple consent popup dismissal - minimal intervention
            console.log("Checking for basic consent popups...");
            let clickedAny = false;

            try {
              const buttons = await page.$$("button, [role='button'], a");
              for (const btn of buttons) {
                try {
                  if (!(await btn.isVisible())) continue;
                  const text = (await btn.innerText().catch(() => "")).trim().toLowerCase();
                  
                  // Only click very obvious accept buttons
                  if (text === "ok" || text === "accept" || text === "continue") {
                    await btn.click().catch(() => {});
                    clickedAny = true;
                    await page.waitForTimeout(500);
                    break;
                  }
                } catch (_) {}
              }
            } catch (_) {}

            return clickedAny;
          }

