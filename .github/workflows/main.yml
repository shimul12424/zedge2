          async function forceCheckByDataHook(page, dataHookValue, label) {
            console.log(`Force checking: ${label}`);

            await page.waitForSelector(
              `input[data-hook="${dataHookValue}-input"]`,
              { state: "attached", timeout: 30000 }
            );

            await page.evaluate((hook) => {
              const input = document.querySelector(`input[data-hook="${hook}-input"]`);
              if (!input) throw new Error(`Checkbox input not found: ${hook}`);
              input.click();
            }, dataHookValue);

            const isChecked = await page.evaluate((hook) => {
              const input = document.querySelector(`input[data-hook="${hook}-input"]`);
              return input ? input.checked : false;
            }, dataHookValue);

            if (!isChecked) {
              console.log(`${label} not checked after click — forcing via JS property`);
              await page.evaluate((hook) => {
                const input = document.querySelector(`input[data-hook="${hook}-input"]`);
                if (!input) throw new Error(`Checkbox input not found: ${hook}`);
                const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
                  window.HTMLInputElement.prototype, "checked"
                ).set;
                nativeInputValueSetter.call(input, true);
                input.dispatchEvent(new Event("click", { bubbles: true }));
                input.dispatchEvent(new Event("change", { bubbles: true }));
                input.dispatchEvent(new MouseEvent("mousedown", { bubbles: true }));
                input.dispatchEvent(new MouseEvent("mouseup", { bubbles: true }));
              }, dataHookValue);
            }

            const finalChecked = await page.evaluate((hook) => {
              const input = document.querySelector(`input[data-hook="${hook}-input"]`);
              return input ? input.checked : false;
            }, dataHookValue);

            if (!finalChecked) throw new Error(`Failed to check checkbox: ${label}`);
            console.log(`${label} confirmed checked`);
          }

          async function uploadWallpaperInDialog(page, localFile) {
            console.log("Waiting for Upload dialog (with file input inside)");

            // Wait specifically for an upload dialog that contains the file input — not the type-selection menu
            let dialog;
            try {
              await page.waitForSelector(
                'input[data-hook="form-field-files-input"]',
                { state: "attached", timeout: 30000 }
              );
              console.log("Upload dialog detected via file input");
              dialog = page.locator('[role="dialog"]').filter({ has: page.locator('input[data-hook="form-field-files-input"]') }).first();
              if (!(await dialog.count())) {
                // Fallback: maybe it's a full page instead of dialog
                console.log("No dialog wrapper found — treating whole page as upload form");
                dialog = page.locator("body");
              }
            } catch (e) {
              await page.screenshot({ path: "zedge-dialog-error.png", fullPage: true });
              throw new Error(`Upload dialog did not appear after 30s. Check zedge-dialog-error.png. Original: ${e.message}`);
            }
            await page.waitForTimeout(1000);

            await forceCheckByDataHook(page, "form-field-accept-input", "first ownership checkbox");
            await page.waitForTimeout(500);

            await forceCheckByDataHook(page, "form-field-acceptContentPolicy-input", "second content policy checkbox");
            await page.waitForTimeout(500);

            console.log("Waiting for file input");
            const fileInput = dialog
              .locator('input[data-hook="form-field-files-input"]')
              .first();

            await fileInput.waitFor({ state: "attached" });
            console.log("Uploading file");
            await fileInput.setInputFiles(localFile);

            await page.waitForFunction(() => {
              const input = document.querySelector('input[data-hook="form-field-files-input"]');
              return input && input.files && input.files.length > 0;
            });

            console.log("Waiting for Upload button to become enabled");
            const uploadButton = dialog
              .locator('button[type="submit"]:has-text("Upload")')
              .first();

            await uploadButton.waitFor({ state: "visible" });
            await scrollToElement(uploadButton);

            await page.waitForFunction(() => {
              const buttons = [...document.querySelectorAll('button[type="submit"]')];
              const upload = buttons.find(btn => btn.textContent.trim() === "Upload");
              return upload && upload.disabled === false;
            });

            await uploadButton.click();

            console.log("Waiting for Edit meta button");
            const editMetaButton = page
              .locator('[role="dialog"] button:has-text("Edit meta")')
              .first();

            await editMetaButton.waitFor({ state: "visible" });

            await page.waitForFunction(() => {
              const buttons = [...document.querySelectorAll("button")];
              const editMeta = buttons.find(btn => btn.textContent.trim() === "Edit meta");
              return editMeta && editMeta.disabled === false;
            });

            await scrollToElement(editMetaButton);
            await editMetaButton.click();
            console.log("Clicked Edit meta");
          }

          async function fillMetaDialog(page, meta) {
            console.log("Waiting for meta dialog to open");

