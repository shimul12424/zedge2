            "Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:130.0) Gecko/20100101 Firefox/130.0"
          ];
          const FP_VIEWPORTS = [
            { width: 1366, height: 768 },
            { width: 1440, height: 900 },
            { width: 1280, height: 800 },
            { width: 1536, height: 864 },
            { width: 1600, height: 900 },
            { width: 1280, height: 720 },
            { width: 1920, height: 1080 }
          ];
          const FP_GL_RENDERERS = [
            "ANGLE (Intel, Intel(R) UHD Graphics 620 Direct3D11 vs_5_0 ps_5_0)",
            "ANGLE (Intel, Intel(R) HD Graphics 630 Direct3D11 vs_5_0 ps_5_0)",
            "ANGLE (NVIDIA, NVIDIA GeForce GTX 1050 Ti Direct3D11 vs_5_0 ps_5_0)",
            "ANGLE (NVIDIA, NVIDIA GeForce GTX 1650 Direct3D11 vs_5_0 ps_5_0)",
            "ANGLE (AMD, AMD Radeon RX 570 Series Direct3D11 vs_5_0 ps_5_0)",
            "ANGLE (Intel, Intel(R) Iris Xe Graphics Direct3D11 vs_5_0 ps_5_0)"
          ];
          const FP_VENDORS = ["Google Inc. (Intel)", "Google Inc. (NVIDIA)", "Google Inc. (AMD)", "Google Inc."];
          const FP_HC     = [2, 4, 4, 6, 8, 8, 12, 16];
          const FP_DM     = [2, 4, 4, 8, 8];
          function fpRand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
          // ─────────────────────────────────────────────────────────────

          (async () => {
            let browser = null;
            let context = null;

            // Profile count is set via the workflow "total_profiles" input (default: 3)
            const TOTAL_PROFILES = parseInt(process.env.TOTAL_PROFILES || "3", 10);

            try {
              // 1. Check Limits & figure out how many uploads we can still do today
              const ZEDGE_DAILY_LIMIT = 3;
              const profileStateData = await getProfileState(TOTAL_PROFILES);
              const remainingUploads = ZEDGE_DAILY_LIMIT - profileStateData.state.totalUploadsToday;
              let currentProfileIndex = profileStateData.nextProfileIndex;
              const perProfileLimit   = profileStateData.perProfileLimit;
              let currentState = profileStateData.state;

              console.log(`✅ Approved. Starting at profile index: ${currentProfileIndex}. Can do ${remainingUploads} upload(s) this run.`);

              // ── Read today's upload type from Firebase state ──────────────────────────────
              const dayType = profileStateData.state.uploadDayType || "AUDIO";
              console.log(`📅 Today's upload type: ${dayType === "AUDIO" ? "🎵 AUDIO (Ringtone)" : "🖼️ WALLPAPER (Image)"} day`);

              // 2. Filter UA pool by selected group then pick random fingerprint
              const UA_GROUP_SEL = (process.env.UA_GROUP || "random").toLowerCase();
              const UA_GROUPS_MAP = {
                chrome_windows: FP_USER_AGENTS.filter(u => u.includes("Windows") && u.includes("Chrome") && !u.includes("Edg/") && !u.includes("OPR/") && !u.includes("Brave") && !u.includes("Firefox")),
                edge_windows:   FP_USER_AGENTS.filter(u => u.includes("Edg/")),
                firefox:        FP_USER_AGENTS.filter(u => u.includes("Firefox")),
                chrome_macos:   FP_USER_AGENTS.filter(u => u.includes("Macintosh") && u.includes("Chrome") && !u.includes("Version/")),
                safari_macos:   FP_USER_AGENTS.filter(u => u.includes("Version/") && u.includes("Safari/605")),
                android_mobile: FP_USER_AGENTS.filter(u => u.includes("Android"))
              };
              const fpUAPool = (UA_GROUPS_MAP[UA_GROUP_SEL] && UA_GROUPS_MAP[UA_GROUP_SEL].length > 0)
                ? UA_GROUPS_MAP[UA_GROUP_SEL]
                : FP_USER_AGENTS;
              console.log(`🌐 UA Group: "${UA_GROUP_SEL}" → pool size: ${fpUAPool.length}`);
              const fpVP       = fpRand(FP_VIEWPORTS);
              const fpUA       = fpRand(fpUAPool);
              const fpHC       = fpRand(FP_HC);
              const fpDM       = fpRand(FP_DM);
              const fpRenderer = fpRand(FP_GL_RENDERERS);
              const fpVendor   = fpRand(FP_VENDORS);
              const fpNoise    = Array.from({ length: 8 }, () => Math.floor(Math.random() * 3));
              console.log(`🎭 Fingerprint: ${fpVP.width}x${fpVP.height} | HC:${fpHC} | DM:${fpDM}GB | UA:...${fpUA.slice(-50)}`);

              // 2. Start Browser ONCE for the whole run
              // ── Proxy connectivity check ──────────────────────────────
              // If a proxy was configured, verify it actually works BEFORE
              // doing anything else. If it is broken we hard-fail immediately
              // rather than silently falling back to a direct connection.
              if (proxy) {
                console.log("🔍 Verifying proxy connectivity...");
                let probeOk = false;
                let probeBrowser = null;
                try {
                  probeBrowser = await chromium.launch({
                    headless: true,
                    proxy,
                    args: ["--no-sandbox", "--disable-dev-shm-usage"]
                  });
                  const probeCtx = await probeBrowser.newContext({ ignoreHTTPSErrors: true });
                  const probePage = await probeCtx.newPage();
                  await probePage.goto("https://ipinfo.io/json", { waitUntil: "domcontentloaded", timeout: 30000 });
                  const bodyText = await probePage.locator("body").innerText();
                  if (!bodyText || !bodyText.trim().startsWith("{")) throw new Error("Unexpected response from proxy connectivity check");
                  await probeCtx.close();
                  await probeBrowser.close();
                  probeBrowser = null;
                  probeOk = true;
                  console.log("✅ Proxy connectivity verified.");
                } catch (probeErr) {
                  if (probeBrowser) await probeBrowser.close().catch(() => {});
                  console.error(`❌ Proxy connectivity check FAILED: ${probeErr.message}`);
                  console.error("🚫 A proxy was provided but is not working. Aborting — will NOT fall back to direct connection.");
                  process.exit(1);
                }
              }
              // ─────────────────────────────────────────────────────────────

              browser = await chromium.launch({
                headless: isHeadless,
                ...(proxy ? { proxy } : {}),
                args: [
                  "--no-sandbox",
                  "--disable-webrtc",
                  "--force-webrtc-ip-handling-policy=disable_non_proxied_udp",
                  "--webrtc-ip-handling-policy=disable_non_proxied_udp",
                  "--disable-blink-features=AutomationControlled",
                  "--disable-features=IsolateOrigins,site-per-process",
                  "--disable-dev-shm-usage",
                  "--no-first-run",
                  "--no-default-browser-check",
                  `--window-size=${fpVP.width},${fpVP.height}`
                ]
              });

              const tz = await getProxyTimezone(browser);

              context = await browser.newContext({
                viewport:            fpVP,
                locale:              "en-US",
                timezoneId:          tz,
                userAgent:           fpUA,
                colorScheme:         "light",
                ignoreHTTPSErrors:   true,
                recordVideo: { dir: "videos/", size: fpVP }
              });

              context.setDefaultTimeout(0);
              context.setDefaultNavigationTimeout(0);

              await context.addInitScript((fp) => {
                // Hide automation
                Object.defineProperty(navigator, "webdriver", { get: () => undefined });
                delete navigator.__proto__.webdriver;

                // Disable WebRTC
                Object.defineProperty(window, "RTCPeerConnection",       { value: undefined });
                Object.defineProperty(window, "webkitRTCPeerConnection", { value: undefined });
                Object.defineProperty(navigator, "mediaDevices",         { value: undefined });

                // Navigator fingerprint
                Object.defineProperty(navigator, "hardwareConcurrency", { get: () => fp.hc });
                Object.defineProperty(navigator, "deviceMemory",        { get: () => fp.dm });
                Object.defineProperty(navigator, "platform",            { get: () => "Win32" });
                Object.defineProperty(navigator, "languages",           { get: () => ["en-US", "en"] });
                Object.defineProperty(navigator, "language",            { get: () => "en-US" });
                Object.defineProperty(navigator, "vendor",              { get: () => "Google Inc." });
                Object.defineProperty(navigator, "maxTouchPoints",      { get: () => 0 });

                // Screen fingerprint
                Object.defineProperty(screen, "width",       { get: () => fp.sw });
                Object.defineProperty(screen, "height",      { get: () => fp.sh });
                Object.defineProperty(screen, "availWidth",  { get: () => fp.sw });
                Object.defineProperty(screen, "availHeight", { get: () => fp.sh - 40 });
                Object.defineProperty(screen, "colorDepth",  { get: () => 24 });
                Object.defineProperty(screen, "pixelDepth",  { get: () => 24 });

                // Canvas noise — subtle ±1-2 pixel shift on readback
                const _origGID = CanvasRenderingContext2D.prototype.getImageData;
                CanvasRenderingContext2D.prototype.getImageData = function(sx, sy, sw, sh) {
                  const id = _origGID.call(this, sx, sy, sw, sh);
                  const n = fp.noise;
                  for (let i = 0; i < id.data.length; i += 4) {
                    id.data[i]   = Math.min(255, id.data[i]   + n[i % 8]);
                    id.data[i+1] = Math.min(255, id.data[i+1] + n[(i+1) % 8]);
                    id.data[i+2] = Math.min(255, id.data[i+2] + n[(i+2) % 8]);
                  }
                  return id;
                };

                // WebGL vendor + renderer spoof
                const _origGP = WebGLRenderingContext.prototype.getParameter;
                WebGLRenderingContext.prototype.getParameter = function(param) {
                  if (param === 37445) return fp.vendor;    // UNMASKED_VENDOR_WEBGL
                  if (param === 37446) return fp.renderer;  // UNMASKED_RENDERER_WEBGL
                  return _origGP.call(this, param);
                };
                const _origGP2 = WebGL2RenderingContext.prototype.getParameter;
                WebGL2RenderingContext.prototype.getParameter = function(param) {
                  if (param === 37445) return fp.vendor;
                  if (param === 37446) return fp.renderer;
                  return _origGP2.call(this, param);
                };

                // Plugins spoof (non-empty list looks more human)
                Object.defineProperty(navigator, "plugins", {
                  get: () => {
                    const p = { length: 3, 0: { name: "Chrome PDF Plugin" }, 1: { name: "Chrome PDF Viewer" }, 2: { name: "Native Client" }, item: i => this[i], namedItem: n => null, refresh: () => {} };
                    return p;
                  }
                });

                // ── Font Fingerprint Noise ─────────────────────────────
                // Intercept measureText so font-probing scripts get
                // slightly randomised metrics instead of the real ones.
                const _origMT = CanvasRenderingContext2D.prototype.measureText;
                CanvasRenderingContext2D.prototype.measureText = function(text) {
                  const metrics = _origMT.call(this, text);
                  const noise = fp.noise[text.length % 8] * 0.05;
                  Object.defineProperty(metrics, "width", {
                    get: () => metrics.width + noise
                  });
                  return metrics;
                };

                // Block common font-detection APIs used by fingerprinters
                const _origFF = document.fonts ? document.fonts.check.bind(document.fonts) : null;
                if (_origFF && document.fonts) {
                  document.fonts.check = function(font, text) {
                    // Always return true — prevents font enumeration
                    return true;
                  };
                }

                // ── Audio Fingerprint Noise ────────────────────────────
                // Add imperceptible noise to AudioBuffer to break audio FP
                const _origCC = AudioBuffer.prototype.getChannelData;
                AudioBuffer.prototype.getChannelData = function(channel) {
                  const data = _origCC.call(this, channel);
                  const seed = fp.noise[channel % 8];
                  for (let i = 0; i < data.length; i += 100) {
                    data[i] += seed * 0.0000001;
                  }
                  return data;
                };

                // Also spoof AnalyserNode float data
                if (typeof AnalyserNode !== "undefined") {
                  const _origGA = AnalyserNode.prototype.getFloatFrequencyData;
                  AnalyserNode.prototype.getFloatFrequencyData = function(arr) {
                    _origGA.call(this, arr);
                    const seed = fp.noise[0] * 0.001;
                    for (let i = 0; i < arr.length; i++) {
                      arr[i] += seed;
                    }
                  };
                }
              }, {
                hc:       fpHC,
                dm:       fpDM,
                sw:       fpVP.width,
                sh:       fpVP.height,
                noise:    fpNoise,
                vendor:   fpVendor,
                renderer: fpRenderer
              });

              const page = await context.newPage();

              // Install persistent background watcher for Zedge privacy/cookie popups
              await installPrivacyPopupWatcher(page);

              await page.setExtraHTTPHeaders({
                "Accept-Language": "en-US,en;q=0.9"
              });

              // 3. BrowserLeaks check ONCE
              console.log("Opening BrowserLeaks");
              await page.goto("https://browserleaks.com/ip", { waitUntil: "domcontentloaded" });
              await page.waitForLoadState("networkidle");
              await scrollFullPage(page);
              await page.evaluate(() => window.scrollTo(0, 0));

              // 4. Login ONCE
              console.log("Opening Zedge");
              await page.goto("https://upload.zedge.net", { waitUntil: "domcontentloaded" });
              await page.waitForLoadState("networkidle");
              await page.waitForTimeout(2000);

              // Screenshot to capture exactly what the page shows before login attempt
              await page.screenshot({ path: "zedge-before-login.png", fullPage: true });
              console.log(`Page URL before login: ${page.url()}`);
              console.log(`Page title before login: ${await page.title()}`);

              // Proceed with login (removed all Didomi/cookie popup handling)
              await safeClick(
                page.locator('[data-hook="za-login-email"]').first(),
                "Continue with Email",
                30000
              );

              await safeType(
                page.locator('[data-hook="form-field-email-input"]'),
                zedgeEmail,
                "email"
              );

              await safeClick(
                page.locator('button[data-hook="za-submit"]'),
                "Continue"
              );

              await safeType(
                page.locator('[data-hook="form-field-password-input"]'),
                zedgePassword,
                "password"
              );

              await safeClick(
                page.locator('button[data-hook="za-submit"]'),
                "Login"
              );

              console.log("Waiting for login success bell icon");
              await page.locator('svg[data-icon="bell"]').waitFor({ state: "visible" });
              await page.screenshot({ path: "zedge-after-login.png", fullPage: true });

              // ─────────────────────────────────────────────────────────────
              // 5. UPLOAD LOOP — repeat up to remainingUploads times
              // ─────────────────────────────────────────────────────────────
              let successCount = 0;

              for (let i = 0; i < remainingUploads; i++) {
                let queueItem = null;
                const uploadNum = i + 1;

                console.log(`\n========================================`);
                console.log(`Upload ${uploadNum} of ${remainingUploads} | Profile Index: ${currentProfileIndex}`);
                console.log(`========================================`);

                try {
                  // Fetch the next queued item
                  queueItem = await getNextWallpaperFromRealtimeDB(dayType);
                } catch (e) {
                  console.log(`Queue is empty after ${successCount} upload(s). Stopping loop.`);
                  break;
                }

                try {
                  // Navigate back to Zedge portal for each upload
                  console.log("Navigating to Zedge upload portal");
                  await page.goto("https://upload.zedge.net", { waitUntil: "domcontentloaded" });
                  await page.waitForLoadState("networkidle");

                  // Click Profiles tab
                  await safeClick(
                    page.locator('a:has-text("Profiles")').first(),
                    "Profiles"
                  );

                  // Click the correct rotated profile
                  await safeClick(
                    page.locator('[data-hook="profile-list"] > div').nth(currentProfileIndex),
                    `Profile Index ${currentProfileIndex}`
                  );

                  // Wait for the profile page to fully render before touching anything.
                  await page.waitForLoadState("networkidle");
                  await page.waitForTimeout(1500);

                  // Navigate directly to the correct content-type URL so we never need to
                  // interact with the unreliable type-selection modal.
                  // URL shape: .../profiles/<profileId>/content/WALLPAPER  (or AUDIO)
                  const profilePageUrl = page.url();
                  const profileBase    = profilePageUrl.replace(/\/content\/[^\/].*$/, "");
                  const targetType     = queueItem.isMp3 ? "AUDIO" : "WALLPAPER";
                  const targetContentUrl = `${profileBase}/content/${targetType}`;
                  console.log(`Navigating directly to ${targetType} page: ${targetContentUrl}`);
                  await page.goto(targetContentUrl, { waitUntil: "domcontentloaded" });
                  await page.waitForLoadState("networkidle");
                  await page.waitForTimeout(1000);

                  // Click the Upload (+) button — now already on the right content-type page
                  await safeClick(
                    page.locator("svg.fa-plus").first(),
                    "Upload plus icon"
                  );

                  // Wait for upload dialog to appear
                  await page.waitForTimeout(800);
                  await page.screenshot({ path: `zedge-upload-menu-${uploadNum}.png`, fullPage: false });

                  // Upload the file
                  await uploadWallpaperInDialog(page, queueItem.localFile);

                  // Fill in meta (title, tags, category, description)
                  await fillMetaDialog(page, {
                    title:       queueItem.title,
                    tags:        queueItem.tags,
                    category:    queueItem.category,
                    description: queueItem.description
                  });

                  // Check publish status — returns {removed, statusName} instead of throwing
                  const publishResult = await verifyPublishStatus(page);

                  await page.screenshot({ path: `zedge-final-${uploadNum}.png`, fullPage: true });

                  // Always delete from Firebase queue and count the upload on the profile,
                  // regardless of whether it was PUBLISHED or removed (PENDING/IN REVIEW/REJECTED).
                  // Only a true technical error (catch block) skips this.
                  await markWallpaperDoneAndDelete(queueItem.id, queueItem.name, queueItem.fileUrl);
                  await updateProfileStateAfterUpload(currentState, currentProfileIndex);

                  // Advance local state for next iteration
                  const profileUploadCounts = { ...(currentState.profileUploadCounts || {}) };
                  profileUploadCounts[currentProfileIndex] = (profileUploadCounts[currentProfileIndex] || 0) + 1;
                  currentState = {
                    ...currentState,
                    totalUploadsToday: currentState.totalUploadsToday + 1,
                    lastUsedProfileIndex: currentProfileIndex,
                    profileUploadCounts
                  };

                  successCount++;

                  const folderLabel = process.env.FOLDER_NAME || "Zedge Bot";
                  const now = new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka", hour12: true, year: "numeric", month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" });
                  let notifyMsg = "";
                  if (publishResult.removed) {
                    notifyMsg = `━━━━━━━━━━━━━━━━━━━━\n⚠️  J.A.R.V.I.S  ALERT\n━━━━━━━━━━━━━━━━━━━━\n📡 System   : ${folderLabel}\n🕐 Time     : ${now}\n\n🔴 ANOMALY DETECTED\n\n📁 File     : ${queueItem.name}\n🏷️  Title    : ${queueItem.title || "N/A"}\n🗂️  Category : ${queueItem.category || "N/A"}\n📊 Status   : ${publishResult.statusName}\n👤 Profile  : #${currentProfileIndex}\n🔢 Run Count: ${successCount} this session\n\n⚡ Asset auto-removed by Zedge.\nManual inspection recommended, Sir.\n━━━━━━━━━━━━━━━━━━━━`;
                    console.log(`⚠️ Upload ${uploadNum} was removed from Zedge (Status: ${publishResult.statusName}). Counted as upload attempt. (${successCount} this run)`);
                  } else {
                    notifyMsg = `━━━━━━━━━━━━━━━━━━━━\n🤖  J.A.R.V.I.S  REPORT\n━━━━━━━━━━━━━━━━━━━━\n📡 System   : ${folderLabel}\n🕐 Time     : ${now}\n\n✅ MISSION ACCOMPLISHED\n\n📁 File     : ${queueItem.name}\n🏷️  Title    : ${queueItem.title || "N/A"}\n🗂️  Category : ${queueItem.category || "N/A"}\n📊 Status   : ${publishResult.statusName}\n👤 Profile  : #${currentProfileIndex}\n🔢 Run Count: ${successCount} this session\n\nAll systems nominal, Sir.\n━━━━━━━━━━━━━━━━━━━━`;
                    console.log(`✅ Upload ${uploadNum} complete! Status: ${publishResult.statusName}. (${successCount} this run)`);
                  }
                  await sendFacebookNotification(notifyMsg);

                } catch (uploadErr) {
                  console.error(`❌ Upload ${uploadNum} failed with a technical error: ${uploadErr.message}`);
                  if (queueItem?.id) {
                    await markWallpaperFailed(queueItem.id, uploadErr.message).catch(() => {});
                  }
                  // Take a failure screenshot and continue to next upload
                  await page.screenshot({ path: `zedge-error-upload-${uploadNum}.png`, fullPage: true }).catch(() => {});
                  console.log("Continuing to next upload despite error...");
                  // Notify user of upload failure
                  try {
                    const errFolder = process.env.FOLDER_NAME || "Zedge Bot";
                    const errTime = new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka", hour12: true, year: "numeric", month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" });
                    const errSnippet = String(uploadErr.message || "Unknown error").slice(0, 120);
                    const uploadErrMsg = `━━━━━━━━━━━━━━━━━━━━\n🚨  J.A.R.V.I.S  WARNING\n━━━━━━━━━━━━━━━━━━━━\n📡 System   : ${errFolder}\n🕐 Time     : ${errTime}\n\n⚠️ UPLOAD FAILURE\n\n📁 File     : ${queueItem?.name || "N/A"}\n🏷️  Title    : ${queueItem?.title || "N/A"}\n🔢 Upload # : ${uploadNum}\n👤 Profile  : #${currentProfileIndex}\n\n🔴 Error Detail:\n${errSnippet}\n\nBot is continuing with next item.\n━━━━━━━━━━━━━━━━━━━━`;
                    await sendFacebookNotification(uploadErrMsg);
                  } catch (_) {}
                }

                // Advance to the next profile still under its per-profile limit.
                // Successful uploads increment profileUploadCounts and will be skipped once at limit.
                // Failed uploads do NOT increment the count so they may be retried on a future run.
                currentProfileIndex = getNextAvailableProfile(currentProfileIndex, currentState.profileUploadCounts, TOTAL_PROFILES, perProfileLimit);
                if (currentProfileIndex === -1) {
                  console.log("All profiles have uploaded today. No further uploads this run.");
                  break;
                }

                // Small pause between uploads to avoid looking like a bot
                if (i < remainingUploads - 1) {
                  console.log("Waiting 3 seconds before next upload...");
                  await page.waitForTimeout(3000);
                }
              }

              console.log(`\n🏁 Run complete. ${successCount} upload(s) succeeded.`);

              // Save video recording before closing browser
              console.log("\n📹 Saving screen recording...");
              try {
                const pages = context.pages();
                if (pages.length > 0) {
                  const videoPath = await pages[0].video()?.path();
                  if (videoPath) {
                    console.log(`✅ Video saved to: ${videoPath}`);
                  }
                }
              } catch (videoErr) {
                console.warn("⚠️ Could not retrieve video path:", videoErr.message);
              }

              await context.close();
              // Wait 2 seconds for video to finish writing to disk
              await new Promise(resolve => setTimeout(resolve, 2000));
              console.log("✅ Video recording finalized.");
              await browser.close();
              
              // Exit cleanly to allow GitHub Actions to proceed to artifact upload
              process.exit(0);

            } catch (err) {
              console.error("BOT FATAL ERROR:", err);
              // Notify user of fatal crash before exiting
              try {
                const crashFolder = process.env.FOLDER_NAME || "Zedge Bot";
                const crashTime = new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka", hour12: true, year: "numeric", month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" });
                const crashSnippet = String(err?.message || err || "Unknown fatal error").slice(0, 150);
                const fatalMsg = `━━━━━━━━━━━━━━━━━━━━\n💀  J.A.R.V.I.S  CRITICAL\n━━━━━━━━━━━━━━━━━━━━\n📡 System   : ${crashFolder}\n🕐 Time     : ${crashTime}\n\n🔴 SYSTEM FAILURE\nAutomation terminated unexpectedly.\n\n🧨 Fatal Error:\n${crashSnippet}\n\n⚡ Immediate attention required.\nCheck GitHub Actions logs, Sir.\n━━━━━━━━━━━━━━━━━━━━`;
                await sendFacebookNotification(fatalMsg);
              } catch (_) {}
              if (context) await context.close().catch(() => {});
              if (browser) await browser.close().catch(() => {});
              process.exit(1);
            }
          })();
          '@ | Set-Content bot.js

      - name: Run bot
        shell: pwsh
        env:
          PROXY_SERVER: ${{ github.event.inputs.proxy_server }}
          PROXY_USER: ${{ github.event.inputs.proxy_user }}
          PROXY_PASS: ${{ github.event.inputs.proxy_pass }}
          ZEDGE_EMAIL: ${{ github.event.inputs.zedge_email }}
          ZEDGE_PASSWORD: ${{ github.event.inputs.zedge_password }}
          HEADLESS: ${{ github.event.inputs.headless }}
          TOTAL_PROFILES: ${{ github.event.inputs.total_profiles }}
          UA_GROUP: ${{ github.event.inputs.ua_group }}
          FOLDER_NAME: "Zedge 3"

        run: node bot.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zedge-artifacts
          path: |
            zedge-before-login.png
            zedge-after-login.png
            zedge-upload-menu-*.png
            zedge-after-type-click-*.png
            zedge-dialog-error.png
            zedge-error-upload-*.png
            zedge-final-*.png
            videos/
            downloads/
