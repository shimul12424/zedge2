            await page.evaluate(() => {
              const wrappers = [...document.querySelectorAll('input[name="lockType"]')];
              const videoAdRadio = wrappers.find(input => {
                const container = input.closest('.sc-fHsOPI') || input.parentElement;
                return container && container.textContent.includes("Video ad");
              });

              if (!videoAdRadio) throw new Error("Video ad radio button not found");

              videoAdRadio.scrollIntoView({ block: "center" });
              videoAdRadio.click();

              videoAdRadio.dispatchEvent(new Event("change", { bubbles: true }));
